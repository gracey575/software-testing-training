<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #0078ff;
        }
        #strength {
            height: 6px;
            width: 100%;
            background: #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }
        #strength-bar {
            height: 100%;
            width: 0%;
            background: red;
            border-radius: 5px;
            transition: width 0.3s;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #005fcc;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: -5px;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <h2>Create Account</h2>

        <form id="SignUpForm">
            <input type="text" id="fullname" placeholder="Full Name" required>

            <label for="dob">Date of Birth</label>
           <input type="date" id="dob" required>
           <p class="error" id="dobError"></p>

            <input type="email" id="email" placeholder="Email Address" required>

            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle" onclick="togglePassword('password')">Show</span>
            </div>

            <div id="strength">
                <div id="strength-bar"></div>
            </div>

            <div class="password-wrapper">
                <input type="password" id="confirm" placeholder="Confirm Password" required>
                <span class="toggle" onclick="togglePassword('confirm')">Show</span>
            </div>

            <p class="error" id="errorMsg"></p>

            <button type="submit">Sign Up</button>
        </form>
    </div>

<script>
    const dob = document.getElementById("dob").value;

// Age validation
const birthDate = new Date(dob);
const today = new Date();
const age = today.getFullYear() - birthDate.getFullYear();
const monthDiff = today.getMonth() - birthDate.getMonth();

if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
    age--;
}

if (age < 18) {
    document.getElementById("dobError").textContent = "You must be at least 18 years old.";
    return;
}

document.getElementById("dobError").textContent = "";


//const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzH2Ja8eqyUca3evH9W5HH4qdO42xyqbL56kVyyOUZK--E-NnYa3GBItQWRZq57D2HVMQ/exec";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx9qGWOu6Buo5mH-I5ttc4I1hpbEmpNlOgXSSic-qRGUYUm0uMGlLtpc5WW7CoF8NhNZg/exec"
// Show/Hide Password
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

// Signup Handler
document.getElementById("SignUpForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const dob = document.getElementById("dob")
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    // Password match check
    if (password !== confirm) {
        document.getElementById("errorMsg").textContent = "Passwords do not match";
        return;
    }

    document.getElementById("errorMsg").textContent = "";

    // const data = {
    //     fullname: fullname,
    //     email: email,
    //     password: password
    // };

    const data = {
    fullname: fullname,
    email: email,
    password: password,
    dob: dob
};

    const res = await fetch(`${WEB_APP_URL}?action=signup`, {
        method: "POST",
        body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.message);

    if (result.status === "success") {
        window.location.href = "login-page.html";
    }
});

</script>

</body>
</html>
