<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
        }
        .container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align:center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle {
            position:absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #0078ff
        }
        #strength {
            height: 6px;
            width: 100px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }
        #strength-bar {
            height: 100%;
            width: 0%;
            background: red;
            border-radius: 5px;
            transition: width 0.3s;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #005fcc;
        }
        .error {
            color:red;
            font-size: 14px;
            margin-top: -5px;
        }
    </style>
</head>
    <body>
        <div class = "signup-container">
            <h2>Create Account</h2>
    <form id="SignUpForm">
    <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>

    <input type="email" name="email" id="email" placeholder="Email Address" required>

    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle" onclick="togglePassword('password')">Show</span>
    </div>

    <div id="strength">
        <div id="strength-bar"></div>
    </div>

    <div class="password-wrapper">
        <input type="password" id="confirm" placeholder="Confirm Password" required>
        <span class="toggle" onclick="togglePassword('confirm')">Show</span>
    </div>

    <p class="error" id="errorMsg"></p>

    <button type="submit">Sign Up</button>
</form>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzv3k3SEkSFEFznukKd0BcOpIecLzQ_ok__27ZrsYCTYtsY0PoQRXm5zSNDpdFuR004/exec";

document.getElementById("SignUpForm").addEventListener("submit", e => {
  e.preventDefault();

  const data = {
    action: "signup",
    Fullname: document.getElementById("fullname").value,
    Email: document.getElementById("email").value,
    Password: document.getElementById("password").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {
    alert("Signup successful");
    window.location.href = "content.html";
  })
  .catch(err => console.error("Error:", err));
});
</script>
        </div>
    </body>
</head>
</html>
