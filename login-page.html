<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        width: 320px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .password-wrapper {
        position: relative;
    }

    .toggle {
        position: absolute;
        right: 10px;
        top: 12px;
        cursor: pointer;
        font-size: 14px;
        color: #0078ff;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #005fcc;
    }
</style>

</head>

<body>
    <!-- <div class="banner-container">
  <img src="banner.png" alt="Software Testing Tutorial Banner" class="site-banner" width="800" height="50">
</div> -->
<div class="container">
    <h2>Login</h2>

    <form id="LoginForm">
        <input type="email" id="email" placeholder="Email Address" required>

        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required>
            <span class="toggle" onclick="togglePassword('password')">Show</span>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
// SAME WEB APP URL AS SIGNUP PAGE
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxopfx2zr8YxqXVB4mLJbkemz96eyUxk7eT9wdPGU1lW6af8fSkVYIjZN_DxGk0muw0aA/exec";

// Show/Hide Password
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

// Login Handler
document.getElementById("LoginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const res = await fetch(`${WEB_APP_URL}?action=login`, {
        method: "POST",
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.status === "success") {
        alert("Login successful");
        window.location.href = "content.html"; // redirect page
    } else {
        alert("Invalid email or password");
    }
});
</script>

</body>
</html>
