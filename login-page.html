<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        width: 320px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .password-wrapper {
        position: relative;
    }

    .toggle {
        position: absolute;
        right: 10px;
        top: 12px;
        cursor: pointer;
        font-size: 14px;
        color: #0078ff;
    }

 button {
        width: 100%;
        padding: 10px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #005fcc;
    }
</style>
</head>
<body>
<div class="container">
    <h2>Login</h2>

    <form id="LoginForm">
        <input type="email" id="email" placeholder="Email Address" required>

        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required>
            <span class="toggle" onclick="togglePassword('loginPass')">Show</span>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}
const loginURL = "https://script.google.com/macros/s/AKfycbz-JZ9Ps47IrrADrxe4IU30TEWjCvhI_6KpgDbGIJGQMLjCOFyEchTfvv4oNpsTRX0/exec";

document.getElementById("LoginForm").addEventListener("submit", e => {
  e.preventDefault();

  const data = {
    Email: document.getElementById("email").value,
    Password: document.getElementById("password").value
  };

  fetch(loginURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {
    if (result.success) {
      alert("Login successful");
      window.location.href = "content.html";
    } else {
      alert("Invalid email or password");
    }
  })
  .catch(err => console.error("Error:", err));
});
</script>

</body>
</html>
